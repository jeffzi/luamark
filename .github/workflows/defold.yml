name: Defold

on: [push, pull_request]

jobs:
  defold:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
            name: desktop
            headless: true
          - platform: js-web
            name: html5
            headless: false

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/defold

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Defold
        uses: dapetcu21/setup-defold@v3.0.3

      - name: Copy luamark source
        run: bash setup.sh

      - name: Build
        run: >-
          java -jar "$BOB"
          --platform ${{ matrix.platform }}
          resolve build --archive

      - name: Bundle (html5)
        if: ${{ !matrix.headless }}
        run: >-
          java -jar "$BOB"
          --platform ${{ matrix.platform }}
          bundle --bundle-output bundle

      - name: Run headless test
        if: ${{ matrix.headless }}
        timeout-minutes: 5
        run: dmengine_headless
