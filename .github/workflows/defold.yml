name: Defold

on: [push, pull_request]

jobs:
  defold:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
            name: desktop
          - platform: js-web
            name: html5

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/defold

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Defold
        uses: dapetcu21/setup-defold@v3.0.3

      - name: Copy luamark source
        run: bash setup.sh

      - name: Build
        run: >-
          java -jar "$BOB"
          --platform ${{ matrix.platform }}
          resolve build --archive

      - name: Run desktop headless test
        if: matrix.platform == 'x86_64-linux'
        timeout-minutes: 5
        run: dmengine_headless

      - name: Bundle html5
        if: matrix.platform == 'js-web'
        run: >-
          java -jar "$BOB"
          --platform js-web
          bundle --bundle-output bundle

      - name: Setup Node.js
        if: matrix.platform == 'js-web'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        if: matrix.platform == 'js-web'
        run: npm install playwright && npx playwright install --with-deps chromium

      - name: Run html5 headless test
        if: matrix.platform == 'js-web'
        timeout-minutes: 5
        run: node test_html5.mjs
